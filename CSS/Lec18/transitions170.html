<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions and tiiltips</title>
    <style>
        div {
            height: 100px;
            width: 100px;
            background-color: black;
            /* transition: height 3s;transition-timing-function: ease-in-out; */
            transition-delay: 3s;
        }
        div:hover {
            height: 500px;
            width: 200px;
            background-color: pink;
        }
    </style>
</head>
<body>
    <!-- Transitions -->
     <div></div>
     <p title="Hello Ankit">Lorem3</p>
</body>
</html>
